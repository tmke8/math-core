name: WASM CI

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  cargo-test-wasm:
    runs-on: ubuntu-latest
    name: "cargo test (wasm)"
    steps:
      - name: "Checkout PR branch"
        uses: actions/checkout@v6
        with:
          path: pr-branch
      - name: "Checkout base branch"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          path: base-branch
      - name: "Install Rust toolchain"
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./pr-branch -> target"
      - name: "Get wasm-bindgen version"
        id: wasm-bindgen-version
        working-directory: ./pr-branch
        run: |
          VERSION=$(grep -A 1 'name = "wasm-bindgen"' Cargo.lock | grep version | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: "Install wasm-bindgen-cli"
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wasm-bindgen-version.outputs.version }}
      - name: "Install wasm-opt"
        uses: jaxxstorm/action-install-gh-release@v2.1.0
        with:
          repo: WebAssembly/binaryen
          tag: version_128
          binaries-location: binaryen-version_128/bin
          chmod: 0755
      - name: "Get wasm size on PR"
        working-directory: ./pr-branch
        run: |
          make optimize
          SIZE_BYTES=$(stat -c %s playground/pkg/math_core_wasm_bg.wasm)
          echo "Wasm size on PR: $SIZE_BYTES bytes"
          echo "PR_SIZE_BYTES=$SIZE_BYTES" >> $GITHUB_ENV
      - name: "Get wasm size on base branch"
        working-directory: ./base-branch
        run: |
          make optimize
          SIZE_BYTES=$(stat -c %s playground/pkg/math_core_wasm_bg.wasm)
          echo "Wasm size on base: $SIZE_BYTES bytes"
          echo "BASE_SIZE_BYTES=$SIZE_BYTES" >> $GITHUB_ENV
      - name: "Build WASM size comment"
        run: |
          SIZE_DIFF=$((PR_SIZE_BYTES - BASE_SIZE_BYTES))
          SIZE_DIFF_PERCENT=$(awk "BEGIN {printf \"%.2f\", ($SIZE_DIFF / $BASE_SIZE_BYTES) * 100}")
          if [ "$SIZE_DIFF" -gt 0 ]; then
            SIZE_DIFF_STR="+$SIZE_DIFF"
          else
            SIZE_DIFF_STR="$SIZE_DIFF"
          fi
          {
            echo "Wasm sizes:"
            echo "Base branch: $BASE_SIZE_BYTES bytes"
            echo "PR: $PR_SIZE_BYTES bytes"
            echo "Size diff: $SIZE_DIFF_STR bytes ($SIZE_DIFF_PERCENT%)"
          } > wasm-size-comment.md
          cat wasm-size-comment.md
      - name: "Upload WASM size comment"
        uses: actions/upload-artifact@v6
        with:
          name: wasm-size-comment
          path: wasm-size-comment.md

  comment-pr:
    name: "Comment on PR with WASM sizes"
    runs-on: ubuntu-latest
    needs: [cargo-test-wasm]
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: "Download WASM size comment"
        uses: actions/download-artifact@v7
        with:
          name: wasm-size-comment
      - name: "Comment on PR with WASM sizes"
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('wasm-size-comment.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
