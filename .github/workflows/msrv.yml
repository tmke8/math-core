name: MSRV check

on:
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Read MSRV from Cargo.toml"
        id: msrv
        run: echo "version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "math-core-cli") | .rust_version')" >> "$GITHUB_OUTPUT"
      - name: "Install Rust toolchain"
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - name: "Build mathcore binary"
        run: cargo build -p math-core-cli --bin mathcore
