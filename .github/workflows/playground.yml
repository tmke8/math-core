name: Deploy playground with wasm module

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: "Install harfbuzz and woff2"
        run: sudo apt-get update && sudo apt-get install -y libharfbuzz-bin woff2
      - name: "Subset fonts"
        run: make subset
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: "Install Rust toolchain"
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: "Get wasm-bindgen version"
        id: wasm-bindgen-version
        run: |
          VERSION=$(grep -A 1 'name = "wasm-bindgen"' Cargo.lock | grep version | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: "Install wasm-bindgen-cli"
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wasm-bindgen-version.outputs.version }}
      - name: "Install wasm-opt"
        uses: jaxxstorm/action-install-gh-release@v2.1.0
        with:
          repo: WebAssembly/binaryen
          tag: version_128
          binaries-location: binaryen-version_128/bin
          chmod: 0755
      - name: "Generate playground"
        run: |
          make playground
      - name: "Generate comparison page"
        run: |
          make comparison
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./playground"

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
